version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: comtech-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-comtech_crm}
      MYSQL_USER: ${MYSQL_USER:-comtech}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-comtech123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - comtech-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: comtech-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - comtech-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5

  # Backend API (NestJS)
  api:
    build:
      context: ./comtech-crm-api-main
      dockerfile: Dockerfile
    container_name: comtech-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-3001}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${MYSQL_USER:-comtech}
      DB_PASSWORD: ${MYSQL_PASSWORD:-comtech123}
      DB_NAME: ${MYSQL_DATABASE:-comtech_crm}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KEYCLOAK_URL: ${KEYCLOAK_URL:-https://sso.clicksbiz.com/}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-SCGJWD-Portal}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-DynamicAppDev}
    ports:
      - "3001:3001"
    volumes:
      - ./comtech-crm-api-main:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - comtech-network

  # Frontend (Nuxt 4)
  frontend:
    build:
      context: ./comtech-crm-app-main
      dockerfile: Dockerfile
    container_name: comtech-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-https://sso.clicksbiz.com/}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-SCGJWD-Portal}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-DynamicAppDev}
    ports:
      - "3000:3000"
    volumes:
      - ./comtech-crm-app-main:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - comtech-network

volumes:
  mysql_data:
  redis_data:

networks:
  comtech-network:
    driver: bridge
